name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - name: Build all modules and run contract tests
        run: ./gradlew clean check javadoc --no-daemon
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: "**/build/reports/tests/test"

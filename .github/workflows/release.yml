name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example, 1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: v${{ inputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v6
      - name: Validate release version
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must look like 1.2.3 or 1.2.3-rc.1"
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "::error::Tag $RELEASE_TAG already exists"
            exit 1
          fi
      - name: Build and test
        run: ./gradlew clean check -PreleaseVersion="$RELEASE_VERSION" --no-daemon
      - name: Publish package
        run: ./gradlew publish -PreleaseVersion="$RELEASE_VERSION" --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$RELEASE_TAG" tava-*/build/libs/*.jar --generate-notes --target "$GITHUB_SHA"
